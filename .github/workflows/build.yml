name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    env:
      DEVKITPRO: /opt/devkitpro
      DEVKITPPC: /opt/devkitpro/devkitPPC

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Add devkitPro tools to PATH
        run: |
          echo "/opt/devkitpro/devkitPPC/bin" >> $GITHUB_PATH
          echo "/opt/devkitpro/tools/bin" >> $GITHUB_PATH

      - name: Build
        run: make

      - name: Prepare release folder
        run: |
          mkdir -p release/wii-shop-patcher
          cp boot.dol release/wii-shop-patcher/boot.dol

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wii-shop-patcher
          path: release/
