name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build with devkitPPC
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/project \
            -w /project \
            devkitpro/devkitppc:latest \
            bash -c "export PATH=/opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:$PATH && make"

      - name: Upload boot.dol
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wii-shop-patcher
          path: boot.dol

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: boot.dol
