name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest
      env:
        PATH: /opt/devkitpro/devkitPPC/bin:/opt/devkitpro/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        DEVKITPRO: /opt/devkitpro
        DEVKITPPC: /opt/devkitpro/devkitPPC

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Build
        run: make

      - name: Prepare release folder
        run: |
          mkdir -p wii-shop-patcher
          cp boot.dol wii-shop-patcher/boot.dol

      - name: Upload boot.dol
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release
          path: wii-shop-patcher/

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: boot.dol
